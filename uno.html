<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mockup estilo feed</title>
<script src="funcionalidad.py"></script>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f0f0;
  }

  .app {
    width: 300px;
    height: 600px;
    margin: 20px auto;
    background: white;
    border: 2px solid #ccc;
    overflow-y: scroll;
    position: relative;
  }

   .header {
    display: flex;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #ddd;
  }

  .profile {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: gray;
    margin-right: 10px;
  }

  .search {
    flex: 1;
    height: 25px;
    border: 1px solid #ccc;
    border-radius: 10px;
  }

  .main-box {
    height: 250px;
    border: 2px solid black;
    margin: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 10px;
    font-weight: bold;
  }

  .post {
    border: 2px solid black;
    margin: 20px;
  }

  .post-title {
    padding: 10px;
    border-bottom: 1px solid black;
    font-weight: bold;
  }

  .post-content {
    height: 200px;
  }

</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="profile"></div>
    <input class="search" type="text">
  </div>

  <div class="main-box">
    Ñoquis
  </div>

  <div class="post">
    <div class="post-title">mi Fideo con Huevo</div>
    <div class="post-content"></div>
  </div>

  <div class="post">
    <div class="post-title">Otra publicación</div>
    <div class="post-content"></div>
  </div>

</div>

</body>
</html>
