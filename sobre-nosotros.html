    <!-- JAVASCRIPT -->
    <script>

        const perfiles = document.querySelectorAll(".perfil");

        perfiles.forEach((card) => {

            card.addEventListener("click", () => {

                // cerrar los otros
                perfiles.forEach(c => c.classList.remove("active"));

                // abrir el seleccionado
                card.classList.add("active");

            });

        });
