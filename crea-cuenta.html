<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4ff339;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #32bd25;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Crea tu cuenta</h2>
        
        <form action="tu_pagina_destino.html" method="GET">
            <div class="input-group">
                <label for="usuario">Nombre de usuario:</label>
                <input type="text" id="usuario" name="usuario" placeholder="Crea tu usuario" required>
            </div>

            <div class="input-group">
                <label for="password">Crea tu Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Crea tu contraseña" required>
            </div>

            <div class="input-group">
                <label for="password">Gmail:</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu Gmail" required>
            </div>

            <button type="submit">Crear</button>
        </form>
    </div>

</body>
</html>
